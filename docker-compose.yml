version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: taskmanager-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Drashti@0406
      MYSQL_DATABASE: taskdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: taskmanager-backend
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: taskmanager-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data: